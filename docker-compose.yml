services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: connectoee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-connectoee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connectoee_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-connectoee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-connectoee} -d ${POSTGRES_DB:-connectoee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microsoft OPC PLC simulator — anonymous + auto-accept for local driver testing.
  # Endpoint: opc.tcp://localhost:50000  (nodes under Telemetry / Slow / Fast / …)
  opcua-sim:
    image: mcr.microsoft.com/iotedge/opc-plc:latest
    container_name: connectoee-opcua-sim
    restart: unless-stopped
    ports:
      - "${OPCUA_SIM_PORT:-50000}:50000"
      - "${OPCUA_SIM_WEB_PORT:-8080}:8080"
    command:
      [
        "--pn=50000",
        "--autoaccept",
        "--sph",
        "--sn=5",
        "--sr=10",
        "--st=uint",
        "--fn=5",
        "--fr=1",
        "--ft=uint",
        "--gn=5",
      ]

volumes:
  pgdata:
